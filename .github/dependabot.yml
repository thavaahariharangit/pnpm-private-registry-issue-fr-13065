version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    versioning-strategy: "increase"
    schedule:
      interval: "daily"
    registries:
      - npm-artifactory

registries:
  npm-artifactory:
    type: "npm-registry"
    url: "https://jfrogghdemo.jfrog.io/artifactory/api/npm/dpndbt-pvt-repo-npm-key/"
    token: ${{ secrets.ARTIFACTORY_API_TOKEN }}
    replaces-base: true
